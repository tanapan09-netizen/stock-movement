
services:
  app:
    container_name: stock-movement-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Database connection string for XAMPP (Host Machine)
      # We override the .env 'localhost' with 'host.docker.internal' here
      - DATABASE_URL=mysql://root:@host.docker.internal:3306/stock_db
      
      # NextAuth / Auth.js v5 Variables
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - AUTH_TRUST_HOST=true
      - MAINTENANCE_REOPEN_PASSWORD=${MAINTENANCE_REOPEN_PASSWORD}
      
      # Legacy NextAuth v4 (Keep for compatibility if needed, though v5 uses AUTH_*)
      - NEXTAUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=${AUTH_URL}
      - CRON_SECRET=${CRON_SECRET}

      # LINE Notification
      - LINE_NOTIFY_TOKEN=${LINE_NOTIFY_TOKEN}
      - LINE_ADMIN_ID=${LINE_ADMIN_ID}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - NEXT_PUBLIC_LINE_NOTIFY_TOKEN=${NEXT_PUBLIC_LINE_NOTIFY_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./backups:/app/backups

