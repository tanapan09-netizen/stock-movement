apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: migrate-db
  labels:
    cloud.googleapis.com/location: asia-southeast1
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: swift-rite-487105-j7:us-central1:stock-db
    spec:
      template:
        spec:
          containers:
          - image: asia-southeast1-docker.pkg.dev/swift-rite-487105-j7/stock-app-repo/stock-app:latest
            command: ["/bin/sh", "-c"]
            args:
            - |
              export npm_config_cache=/tmp &&
              echo "Starting migration with npx..." &&
              npx -y prisma db push --accept-data-loss --force-reset &&
              echo "Migration complete. Starting seed..." &&
              node prisma/reset-smart.js
            env:
            - name: DATABASE_URL
              value: "mysql://appuser:AppPass2024@localhost/stock_db?socket=/cloudsql/swift-rite-487105-j7:us-central1:stock-db"
            - name: PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK
              value: "1"
            resources:
              limits:
                memory: "1Gi"
          timeoutSeconds: 300
          serviceAccountName: 203913436900-compute@developer.gserviceaccount.com
