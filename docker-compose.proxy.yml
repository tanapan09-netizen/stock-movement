services:
  proxy:
    image: openresty/openresty:1.27.1.2-alpine-fat
    container_name: stock-movement-proxy
    restart: always
    depends_on:
      - app
    ports:
      - "${PROXY_PORT:-8088}:80"
    volumes:
      - ./deploy/openresty/stock-movement.docker.conf:/usr/local/openresty/nginx/conf/conf.d/default.conf:ro
      - ./deploy/openresty/errors:/usr/local/openresty/nginx/html/errors:ro
