services:
  app:
    container_name: stock-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_LINE_LIFF_ID: ${NEXT_PUBLIC_LINE_LIFF_ID}
        NEXT_PUBLIC_LINE_LIFF_REPAIR_REQUEST_ID: ${NEXT_PUBLIC_LINE_LIFF_REPAIR_REQUEST_ID}
        NEXT_PUBLIC_LINE_LIFF_CUSTOMER_REGISTER_ID: ${NEXT_PUBLIC_LINE_LIFF_CUSTOMER_REGISTER_ID}
    restart: always
    ports:
      - "3002:3000"
    environment:
      # Database connection (External sg.sugoidev.com)
      - DATABASE_URL=${DATABASE_URL}

      # NextAuth
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_URL=${AUTH_URL}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - MAINTENANCE_REOPEN_PASSWORD=${MAINTENANCE_REOPEN_PASSWORD}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-false}

      # Application URL (for notifications and links)
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_LINE_LIFF_ID=${NEXT_PUBLIC_LINE_LIFF_ID}
      - NEXT_PUBLIC_LINE_LIFF_REPAIR_REQUEST_ID=${NEXT_PUBLIC_LINE_LIFF_REPAIR_REQUEST_ID}
      - NEXT_PUBLIC_LINE_LIFF_CUSTOMER_REGISTER_ID=${NEXT_PUBLIC_LINE_LIFF_CUSTOMER_REGISTER_ID}

      # LINE Login
      - AUTH_LINE_ID=${AUTH_LINE_ID}
      - AUTH_LINE_SECRET=${AUTH_LINE_SECRET}

      # LINE Notifications (Phase 2)
      - LINE_MESSAGING_ENABLED=${LINE_MESSAGING_ENABLED:-true}
      - LINE_ADMIN_ID=${LINE_ADMIN_ID}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}

      # Email Notifications (Optional)
      - EMAIL_ENABLED=${EMAIL_ENABLED:-true}
      - APPROVER_EMAILS=${APPROVER_EMAILS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}

      # Cron Job Secret (for auto-escalation API)
      - CRON_SECRET=${CRON_SECRET}
      # GCS (Optional - if set, uses GCS. If not, uses local public/uploads volume)
      # - GCP_PROJECT_ID=...
      # - GCP_BUCKET_NAME=...

    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads

  db:
    image: mysql:8.0
    container_name: stock-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-stockpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stock_db}
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-stockpassword}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
