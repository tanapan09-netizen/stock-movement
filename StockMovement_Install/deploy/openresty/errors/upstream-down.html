<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ระบบไม่พร้อมใช้งานชั่วคราว</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --card: #ffffff;
      --fg: #0f172a;
      --muted: #475569;
      --accent: #0ea5e9;
      --border: #e2e8f0;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: radial-gradient(circle at top right, #e0f2fe 0%, var(--bg) 45%);
      color: var(--fg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 28px;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      color: #0369a1;
      background: #e0f2fe;
      border: 1px solid #bae6fd;
      border-radius: 999px;
      padding: 6px 10px;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.3;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    a {
      text-decoration: none;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px 14px;
      color: var(--fg);
      font-weight: 600;
    }
    a.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .meta {
      margin-top: 16px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Service Unavailable</div>
    <h1>ระบบชั่วคราวไม่พร้อมใช้งาน</h1>
    <p>ขณะนี้เซิร์ฟเวอร์กำลังรีสตาร์ตหรืออยู่ระหว่างปรับปรุงชั่วคราว</p>
    <p>กรุณารอสักครู่แล้วลองใหม่อีกครั้ง</p>
    <div class="actions">
      <a class="primary" href="javascript:location.reload()">ลองใหม่</a>
      <a href="/">กลับหน้าแรก</a>
    </div>
    <div class="meta">Ref: UPSTREAM_DOWN (502/503/504)</div>
  </main>
</body>
</html>
