upstream stock_movement_upstream {
    # Update this to the app host/port that OpenResty proxies to.
    server 127.0.0.1:3002 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Show custom pages/messages when upstream is down.
    proxy_intercept_errors on;

    # Browser pages
    error_page 502 503 504 /errors/upstream-down.html;

    location = /errors/upstream-down.html {
        root /usr/local/openresty/nginx/html;
        internal;
        add_header Cache-Control "no-store, max-age=0";
    }

    location @api_upstream_down {
        default_type application/json;
        add_header Cache-Control "no-store, max-age=0";
        return 503 '{"ok":false,"code":"UPSTREAM_DOWN","message":"Service temporarily unavailable. Please try again."}';
    }

    location /api/ {
        error_page 502 503 504 = @api_upstream_down;
        proxy_pass http://stock_movement_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://stock_movement_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
